{% extends 'base.html' %}

{% block title %}Recuperar Contraseña | Gestor{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-lg p-4" style="border-radius: 25px;">
                <div class="text-center mb-4">
                    <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                        <i class="bi bi-key-fill text-success fs-1"></i>
                    </div>
                    <h2 class="fw-bold text-dark">¿Olvidaste tu clave?</h2>
                    <p class="text-muted small">Ingresa tu correo electrónico para enviarte un enlace de recuperación.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold text-secondary small text-uppercase">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-success"><i class="bi bi-envelope-at"></i></span>
                            <input type="email" name="email" id="email" class="form-control border-start-0 ps-0" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-sena py-3 fw-bold shadow-sm" style="border-radius: 15px;">
                            Enviar enlace
                        </button>
                        <a href="{% url 'login' %}" class="btn btn-link text-decoration-none text-muted small">Volver al inicio de sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control, .input-group-text {
        border-radius: 12px;
        padding: 0.75rem 1rem;
    }
    .form-control:focus {
        border-color: #39A900;
        box-shadow: 0 0 0 0.25rem rgba(57, 169, 0, 0.15);
    }
</style>
{% endblock %}
